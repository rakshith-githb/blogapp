<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inkflow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52B788;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#0F0F0F"/>
  
  <!-- Flowing ink/water wave pattern -->
  <path d="M 40 100 Q 60 80 80 100 T 120 100 T 160 100 T 200 100 T 240 100" 
        stroke="url(#inkflow-gradient)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Ink drop -->
  <ellipse cx="128" cy="150" rx="18" ry="26" fill="url(#inkflow-gradient)" opacity="0.9"/>
  <circle cx="128" cy="130" r="5" fill="url(#inkflow-gradient)"/>
  
  <!-- Secondary flowing line -->
  <path d="M 50 180 Q 90 160 130 175 T 210 170" 
        stroke="url(#inkflow-gradient)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>